            <a href="index.html" class="navbar-brand logo"><span class="text-success">Eco</span>Tech</a>
            <!-- Botón adaptable para menú responsive -->

            </button>
            <!-- Menú de navegación colapsable -->

    <div class="card-box">
        <h3>Iniciar Sesión</h3>
        <form action="../php/login.php" method="POST">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="correo" class="form-control" placeholder="Usuario o correo electronico"
                        required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="contrasena" class="form-control" placeholder="Contraseña" required />
                </div>
            </div>
            <button type="submit" class="btn-main">Iniciar Sesión</button>
        </form>
        <br>
        <p class="text-center mb-3" style="font-size: 14px">
            ¿No tienes cuenta? <a href="Registro.html">Registrarte</a>
        </p>
