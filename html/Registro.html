<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../css/Registro.css" />

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a href="#" class="navbar-brand logo"><span class="text-success">Eco</span>Tech</a>
            <!-- Botón adaptable para menú responsive -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarS"
                aria-controls="navbarS" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Menú de navegación colapsable -->
            <div class="collapse navbar-collapse" id="navbarS">
                <ul class="navbar-nav ms-auto">
                    <!-- Enlaces de navegación principales -->
                    <li class="nav-item">
                        <a class="nav-link texto-efecto" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-efecto" href="registro.html">Registrate</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-efecto" href="servicios.html">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-efecto" href="servicios.html">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-efecto" href="servicios.html">Nosotros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="card-box">
        <h3>Crear Cuenta</h3>
        <form>
            <div class="mb-3">
                <label class="form-label">Primer Nombre</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" placeholder="Primer nombre" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Primer Apellido</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" placeholder="Primer apellido" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Segundo Apellido</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" placeholder="Segundo apellido" required />
                </div>
            </div>


            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="correo electronico" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" placeholder="Crea una contraseña" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" placeholder="Confirma tu contraseña" required />
                </div>
            </div>
            <button type="submit" class="btn-main">Registrarse</button>
        </form>
        <br>

        <p class="text-center mb-3" style="font-size: 14px">
            ¿No tienes cuenta? <a href="Login.html">Iniciar Sesión</a>
        </p>
    </div>
</body>

</html>
