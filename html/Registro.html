            <a href="index.html" class="navbar-brand logo"><span class="text-success">Eco</span>Tech</a>

                aria-controls="navbarS" aria-expanded="false" aria-label="Toggle navigation">

            </button>
            <!-- Menú de navegación colapsable -->
            <div class="collapse navbar-collapse" id="navbarS">
                <ul class="navbar-nav ms-auto">
                    <!-- Enlaces de navegación principales -->
                    <li class="nav-item">
                        <a class="nav-link texto-efecto" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">

                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="card-box">
        <h3 class="logo" style="font-size: 2.2rem; margin-bottom: 20px">
            Crear Cuenta
        </h3>
        <form method="POST" action="../php/registro.php">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input name="nombre" type="text" class="form-control" placeholder="Nombre" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Primer Apellido</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input name="primer_apellido" type="text" class="form-control" placeholder="Primer apellido"
                        required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Segundo Apellido</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input name="segundo_apellido" type="text" class="form-control" placeholder="Segundo apellido"
                        required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input name="correo" type="email" class="form-control" placeholder="correo electronico" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input name="contrasena" type="password" class="form-control" placeholder="Crea una contraseña"
                        required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Rol de Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                    <select name="rol" class="form-control" required>
                        <option value="" disabled selected>Seleccione un rol</option>
                        <option value="admin">Administrador</option>
                        <option value="cliente">Cliente</option>
                        <option value="operador">Operador</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-main">Registrarse</button>
        </form>
        <br />

        <p class="text-center mb-3" style="font-size: 14px">
            ¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a>
        </p>
    </div>
